name: Build Matrix

on:
  pull_request:
  push:

jobs:
  windows-build:
    runs-on: [windows-latest]
    name: Validation
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Run validation
      run: |
        start /wait D:/a/The-Grand-Combo/The-Grand-Combo/KatEngine.exe -validate -mod TGC.mod
